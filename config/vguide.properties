# Unified VGuide (use with cpa.predicate.refinement.useVocabularyGuide=true)
# LLM model: deepseek-v4-pro (Java/Python default; override with DEEPSEEK_MODEL env)
vguide.enable = true
vguide.wallBudgetSec = 0

# Hard cap on spurious rounds that invoke LLM (0 = disable). Each round may fire multiple API
# draws when llmSamplesPerCall>1; maxLlmRounds counts rounds, not HTTP requests.
# When to call LLM on spurious CE:
#   first_spurious  - only refinement #1 (default, lowest cost)
#   every_n         - #1, then every N spurious refinements (#1+N, #1+2N, …)
#   min_interval    - #1, then only if llmMinIntervalSec elapsed since last call
#   every_n_and_interval - both conditions
# 排程推導見 docs/vguided-cegar/LLM_CALL_SCHEDULING.md (LLM p50~1s, batch avg~1.65s)
# Default schedule: min_interval=15s (3×L_p99 margin); every_n≈ceil(15/0.21)≈72
vguide.llmCallSchedule = every_n_and_interval
vguide.llmEveryNSpuriousRefinements = 72
vguide.llmMinIntervalSec = 15
vguide.maxLlmRoundsPerAnalysis = 5

# Ensemble (multi-draw per LLM round). Refinement #1 always 1 sync draw (LLM cache seed).
# Refinement #2+: 1 sync + (K-1) parallel extras with the same prompt. Default K=1.
vguide.llmSamplesPerCall = 1
vguide.llmSampleParallelism = 4

vguide.frozenDir = docs/vguided-cegar/predicate_sets
vguide.allowInterpolantStrengthen = true

# Default off: experiments show better PAR-2 / solved count without L3 on full_scalar.
# Enable per run: --option vguide.enableL3Entailment=true  or  run.sh cpa --ablation l3
vguide.enableL3Entailment = false
