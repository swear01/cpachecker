# Experiment: higher LLM frequency (every_n=12) + adaptive budget (non-thinking).
# Successor to v1.3.0 freq10-n24; raises max LLM rounds to 20.
# Usage:
#   export VGUIDE_CONFIG=config/vguide-experiment-freq20-n12.properties
#   export VGUIDE_LLM_THINKING=disabled
#   ./scripts/vguided-cegar/run.sh cpa --set full_scalar --ablation no-l3 ...
#include predicateAnalysis-vguide.properties

vguide.llmCallSchedule = every_n_and_interval
vguide.llmEveryNSpuriousRefinements = 12
vguide.llmMinIntervalSec = 15
vguide.maxLlmRoundsPerAnalysis = 20
vguide.enableAdaptivePredicateBudget = true
vguide.llmMaxCompletionTokens = 2048
